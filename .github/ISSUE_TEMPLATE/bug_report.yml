name: Bug report
description: Report something that is broken or behaving unexpectedly in Métropolist.
title: "[Bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill in the details below so the issue can be reproduced.
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of what the bug is.
      placeholder: When I tap on a line in the Bus list, the app...
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Step-by-step instructions to trigger the bug.
      placeholder: |
        1. Open the app
        2. Go to the Lines tab
        3. Tap on line ...
        4. See the error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen instead?
    validations:
      required: true
  - type: input
    id: app-version
    attributes:
      label: App version
      description: Found in the app's About / Settings screen, or on the App Store page.
      placeholder: "1.7.5"
    validations:
      required: true
  - type: input
    id: ios-version
    attributes:
      label: iOS version
      placeholder: "iOS 18.2"
    validations:
      required: true
  - type: input
    id: device
    attributes:
      label: Device
      placeholder: "iPhone 15 Pro"
    validations:
      required: true
  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots or screen recordings
      description: If applicable, drag images or videos here to help explain the problem.
  - type: checkboxes
    id: checks
    attributes:
      label: Checklist
      options:
        - label: I have searched existing issues and this bug has not already been reported.
          required: true
        - label: I am running the latest version of Métropolist from the App Store.
          required: true
